name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    # Prevent execution on forks
    if: github.repository_owner == 'iExec-Nox'
    uses: iExecBlockchainComputing/github-actions-workflows/.github/workflows/release-please.yml@release-please-v2.0.0
    secrets:
      application_id: ${{ secrets.RELEASE_PLEASE_APPLICATION_ID }}
      application_private_key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
