[package]
name = "nox-ingestor"
version = "0.1.0"
edition = "2024"

[dependencies]
alloy = { version = "1.5.2", features = ["full"] }
anyhow = "1.0.100"
config = "0.15.19"
config-secret = "0.1.0"
once_cell = "1.21.3"
serde = { version = "1.0.228", features = ["derive"] }
